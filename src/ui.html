<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Figma Plugin UI</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      button {
        border: none;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 13px;
        background: #18a0fb;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #0d8de3;
      }
      p {
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <button id="create-rect">Create rectangle</button>
    <p>Creates a sample node in the current page.</p>
    <script>
      const button = document.getElementById("create-rect");
      button?.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "create-rectangle" } }, "*");
      });
    </script>
  </body>
</html>
